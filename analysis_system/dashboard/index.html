<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书数据采集与分析平台</title>
<script src="/static/vendor/echarts.min.js"></script>
<style>
  :root {
    --bg: #f3efe6;
    --paper: #fffdf8;
    --line: rgba(29, 38, 46, 0.10);
    --ink: #182126;
    --muted: #6d777e;
    --accent: #bc4b2f;
    --accent-soft: #f7dfd7;
    --teal: #1f756a;
    --gold: #9a6b10;
    --blue: #295c89;
    --shadow: 0 18px 44px rgba(24, 33, 38, 0.08);
    --radius: 22px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at top left, rgba(188, 75, 47, 0.10), transparent 25%),
      radial-gradient(circle at top right, rgba(41, 92, 137, 0.12), transparent 24%),
      linear-gradient(180deg, #f8f3ea 0%, #f3efe6 55%, #f6f1e7 100%);
    color: var(--ink);
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
  }

  h1, h2, h3 {
    margin: 0;
    font-family: "Georgia", "Times New Roman", "Songti SC", serif;
    letter-spacing: 0.02em;
  }

  button, input, select { font: inherit; }
  code {
    background: rgba(24, 33, 38, 0.06);
    padding: 2px 6px;
    border-radius: 8px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    backdrop-filter: blur(12px);
    background: rgba(248, 243, 234, 0.86);
    border-bottom: 1px solid rgba(24, 33, 38, 0.08);
  }

  .topbar-inner, .shell {
    width: min(1400px, calc(100vw - 28px));
    margin: 0 auto;
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 74px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #de7c4e);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    box-shadow: 0 10px 22px rgba(188, 75, 47, 0.22);
  }

  .brand-title {
    font-size: 18px;
    font-weight: 700;
  }

  .brand-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 3px;
  }

  .nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-btn, .ghost-btn, .solid-btn, .index-chip {
    border: none;
    cursor: pointer;
    transition: transform .2s ease, background .2s ease, color .2s ease;
  }

  .nav-btn {
    padding: 10px 14px;
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
  }

  .nav-btn.active {
    background: rgba(24, 33, 38, 0.08);
    color: var(--ink);
    font-weight: 600;
  }

  .top-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .solid-btn, .ghost-btn {
    padding: 11px 16px;
    border-radius: 999px;
  }

  .solid-btn {
    background: var(--accent);
    color: white;
    box-shadow: 0 10px 22px rgba(188, 75, 47, 0.20);
  }

  .ghost-btn {
    background: rgba(24, 33, 38, 0.08);
    color: var(--ink);
  }

  .nav-btn:hover, .solid-btn:hover, .ghost-btn:hover, .index-chip:hover {
    transform: translateY(-1px);
  }

  .shell {
    padding: 22px 0 34px;
  }

  .hero {
    border-radius: 32px;
    padding: 28px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,247,234,0.96)),
      linear-gradient(135deg, rgba(31,117,106,0.06), rgba(188,75,47,0.08));
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 22px;
    align-items: start;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: rgba(24, 33, 38, 0.06);
    color: var(--muted);
    border-radius: 999px;
    font-size: 12px;
    margin-bottom: 14px;
  }

  .hero-title {
    font-size: clamp(28px, 4vw, 46px);
    line-height: 1.08;
    margin-bottom: 12px;
  }

  .hero-copy {
    color: var(--muted);
    line-height: 1.8;
    font-size: 15px;
    max-width: 760px;
  }

  .hero-meta, .mini-grid, .legend-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .hero-meta {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .metric-card, .mini-card, .panel {
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(255,255,255,0.78);
    box-shadow: var(--shadow);
  }

  .metric-card {
    padding: 18px;
    border-radius: 20px;
  }

  .metric-card small, .mini-card small {
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  .metric-card strong, .mini-card strong {
    display: block;
    font-size: 24px;
    margin-bottom: 4px;
  }

  .metric-card span, .mini-card span {
    color: var(--muted);
    font-size: 12px;
  }

  .index-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  #pages-root {
    position: relative;
  }

  .index-chip {
    padding: 9px 14px;
    border-radius: 999px;
    background: rgba(24, 33, 38, 0.06);
    color: var(--muted);
  }

  .page {
    position: absolute;
    inset: 0;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
    height: 0;
  }

  .page.active {
    position: relative;
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
    overflow: visible;
    height: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 18px;
  }

  .panel {
    grid-column: span 12;
    border-radius: var(--radius);
    padding: 22px;
    backdrop-filter: blur(10px);
  }

  .span-4 { grid-column: span 4; }
  .span-5 { grid-column: span 5; }
  .span-6 { grid-column: span 6; }
  .span-7 { grid-column: span 7; }
  .span-8 { grid-column: span 8; }

  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .panel-title {
    font-size: 24px;
    margin-bottom: 4px;
  }

  .panel-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.75;
  }

  .panel-tag {
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    white-space: nowrap;
    background: var(--accent-soft);
    color: var(--accent);
  }

  .mini-card {
    padding: 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: var(--paper);
  }

  .chart {
    width: 100%;
    min-height: 340px;
  }

  .chart.short {
    min-height: 300px;
  }

  .table-wrap {
    overflow: auto;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.88);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
  }

  th, td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(24, 33, 38, 0.08);
    text-align: left;
    vertical-align: top;
    font-size: 13px;
  }

  th {
    position: sticky;
    top: 0;
    background: #fbf2e3;
    color: var(--muted);
    z-index: 1;
  }

  .warn-list {
    display: grid;
    gap: 10px;
  }

  .warn-item {
    padding: 14px;
    border-radius: 16px;
    border: 1px solid rgba(188,75,47,0.14);
    background: #fff4ef;
    line-height: 1.7;
    font-size: 13px;
  }

  .loading {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(243, 239, 230, 0.78);
    backdrop-filter: blur(8px);
  }

  .loading.hidden { display: none; }

  .loading-card {
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(24, 33, 38, 0.08);
  }

  .spinner {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 2px solid rgba(188,75,47,0.18);
    border-top-color: var(--accent);
    animation: spin .75s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 1180px) {
    .hero-grid { grid-template-columns: 1fr; }
    .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 12; }
    .mini-grid, .legend-grid, .hero-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 860px) {
    .topbar-inner { padding: 10px 0; flex-direction: column; align-items: stretch; }
    .nav { justify-content: flex-start; }
    .top-actions { justify-content: flex-start; }
    .mini-grid, .legend-grid, .hero-meta { grid-template-columns: 1fr; }
    .panel { padding: 18px; }
  }
</style>
</head>
<body>
<div class="loading" id="loading">
  <div class="loading-card">
    <div class="spinner"></div>
    <span>正在生成分析快照与可视化视图...</span>
  </div>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">XHS</div>
      <div>
        <div class="brand-title">小红书数据采集与分析平台</div>
        <div class="brand-sub" id="brand-sub">内容趋势、传播表现与用户反馈的综合洞察平台</div>
      </div>
    </div>
    <nav class="nav" id="main-nav"></nav>
    <div class="top-actions">
      <button class="ghost-btn" onclick="loadDashboard()">刷新看板</button>
      <button class="solid-btn" onclick="rebuildDataset()">同步数据</button>
    </div>
  </div>
</header>

<div class="shell">
  <section class="hero">
    <div class="hero-grid">
      <div>
        <div class="hero-badge">内容趋势 · 传播表现 · 舆情洞察</div>
        <h1 class="hero-title">洞察内容趋势，读懂传播表现与用户反馈</h1>
        <div class="hero-copy">
          围绕内容质量、互动结构、评论情绪、指标关联和聚类画像，帮助快速发现热门话题、高质量内容、传播机会与潜在风险，
          让分析结果更清晰，决策依据更直观。
        </div>
      </div>
      <div class="hero-meta" id="hero-metrics"></div>
    </div>
  </section>

  <div class="index-bar" id="page-index"></div>
  <main id="pages-root"></main>
</div>
<script>
  const $ = (id) => document.getElementById(id);
  const NAV_ITEMS = [
    { id: 'overview', label: '总览', anchors: ['overview-kpis-panel', 'overview-trend-panel', 'overview-region-panel', 'overview-topnotes-panel'] },
    { id: 'opinion', label: '舆情监测', anchors: ['opinion-sentiment-panel', 'opinion-risk-panel', 'opinion-comments-panel'] },
    { id: 'content', label: '内容分析', anchors: ['content-score-panel', 'content-keyword-panel', 'content-topquality-panel'] },
    { id: 'relationship', label: '关联挖掘', anchors: ['relationship-highlight-panel', 'relationship-heatmap-panel', 'relationship-pair-panel'] },
    { id: 'clusters', label: '聚类洞察', anchors: ['cluster-scatter-panel', 'cluster-table-panel'] },
    { id: 'assets', label: '数据资产', anchors: ['asset-summary-panel', 'asset-schema-panel'] }
  ];

  const charts = {};
  const renderedPages = new Set();
  let dashboard = null;
  let currentPage = 'overview';

  function buildPages() {
    $('pages-root').innerHTML = `
      <section class="page active" data-page="overview">
        <div class="grid">
          <div class="panel" id="overview-kpis-panel"><div class="panel-head"><div><h2 class="panel-title">传播总览</h2><div class="panel-desc">先看样本规模、平均质量分和总互动量，再进入时间趋势与地域分布。</div></div><div class="panel-tag" id="overview-tag">等待加载</div></div><div class="mini-grid" id="overview-kpis"></div></div>
          <div class="panel span-8" id="overview-trend-panel"><div class="panel-head"><div><h2 class="panel-title">发布趋势</h2><div class="panel-desc">按日观察笔记发布节奏，作为整个分析平台的时间基线。</div></div></div><div class="chart" id="overview-trend-chart"></div></div>
          <div class="panel span-4" id="overview-type-panel"><div class="panel-head"><div><h2 class="panel-title">内容类型</h2><div class="panel-desc">图文与视频的占比概览。</div></div></div><div class="chart short" id="overview-type-chart"></div></div>
          <div class="panel span-6" id="overview-region-panel"><div class="panel-head"><div><h2 class="panel-title">地域互动强度</h2><div class="panel-desc">按属地聚合总互动量，识别内容活跃区域。</div></div></div><div class="chart" id="overview-region-chart"></div></div>
          <div class="panel span-6" id="overview-author-panel"><div class="panel-head"><div><h2 class="panel-title">头部作者</h2><div class="panel-desc">展示互动总量领先的作者，用于快速识别核心样本来源。</div></div></div><div class="table-wrap" id="overview-author-table"></div></div>
          <div class="panel" id="overview-topnotes-panel"><div class="panel-head"><div><h2 class="panel-title">高质量笔记样本</h2><div class="panel-desc">综合质量分、互动量和发布时间一起看，避免只看点赞的单一排序。</div></div></div><div class="table-wrap" id="overview-topnotes-table"></div></div>
        </div>
      </section>
      <section class="page" data-page="opinion">
        <div class="grid">
          <div class="panel" id="opinion-sentiment-panel"><div class="panel-head"><div><h2 class="panel-title">舆情温度</h2><div class="panel-desc">笔记文本与评论文本分别做情绪识别，辅助判断当前样本的情绪偏向。</div></div></div><div class="legend-grid" id="opinion-metrics"></div></div>
          <div class="panel span-5" id="opinion-distribution-panel"><div class="panel-head"><div><h2 class="panel-title">情绪分布</h2><div class="panel-desc">笔记情绪与评论情绪的总体占比。</div></div></div><div class="chart" id="opinion-distribution-chart"></div></div>
          <div class="panel span-7" id="opinion-timeline-panel"><div class="panel-head"><div><h2 class="panel-title">情绪时序</h2><div class="panel-desc">按日期观察评论中的正向、中性、负向波动。</div></div></div><div class="chart" id="opinion-timeline-chart"></div></div>
          <div class="panel span-4" id="opinion-risk-panel"><div class="panel-head"><div><h2 class="panel-title">风险关键词</h2><div class="panel-desc">帮助发现争议、翻车、营销质疑等风险语义。</div></div></div><div class="chart short" id="opinion-risk-chart"></div></div>
          <div class="panel span-8" id="opinion-controversy-panel"><div class="panel-head"><div><h2 class="panel-title">争议笔记</h2><div class="panel-desc">结合评论量、负面占比与讨论热度识别高争议内容。</div></div></div><div class="table-wrap" id="opinion-controversy-table"></div></div>
          <div class="panel" id="opinion-comments-panel"><div class="panel-head"><div><h2 class="panel-title">高热负向评论</h2><div class="panel-desc">从负向评论里再按点赞排序，观察真正被用户放大的风险声音。</div></div></div><div class="table-wrap" id="opinion-comments-table"></div></div>
        </div>
      </section>
      <section class="page" data-page="content">
        <div class="grid">
          <div class="panel" id="content-score-panel"><div class="panel-head"><div><h2 class="panel-title">内容质量视角</h2><div class="panel-desc">把内容完整度、传播表现和讨论热度拆开看，再合成为综合质量分。</div></div></div><div class="legend-grid" id="content-score-cards"></div></div>
          <div class="panel span-6" id="content-keyword-panel"><div class="panel-head"><div><h2 class="panel-title">高频关键词</h2><div class="panel-desc">从笔记文本抽取高频词，观察内容主题集中在哪些语义区域。</div></div></div><div class="chart" id="content-keyword-chart"></div></div>
          <div class="panel span-6" id="content-tag-panel"><div class="panel-head"><div><h2 class="panel-title">热门标签</h2><div class="panel-desc">标签频次可以辅助判断种草主题与内容表达习惯。</div></div></div><div class="chart" id="content-tag-chart"></div></div>
          <div class="panel span-4" id="content-qualitydist-panel"><div class="panel-head"><div><h2 class="panel-title">质量分层</h2><div class="panel-desc">S/A/B/C/D 五档分层，快速判断样本质量结构。</div></div></div><div class="chart short" id="content-qualitydist-chart"></div></div>
          <div class="panel span-8" id="content-scatter-panel"><div class="panel-head"><div><h2 class="panel-title">正文长度与互动关系</h2><div class="panel-desc">把正文长度、互动量和质量分叠在一个散点图里，观察内容深度与传播表现的关系。</div></div></div><div class="chart" id="content-scatter-chart"></div></div>
          <div class="panel" id="content-topquality-panel"><div class="panel-head"><div><h2 class="panel-title">高质量内容样本</h2><div class="panel-desc">可作为后续选题、模仿或案例分析的重点对象。</div></div></div><div class="table-wrap" id="content-topquality-table"></div></div>
        </div>
      </section>
      <section class="page" data-page="relationship">
        <div class="grid">
          <div class="panel" id="relationship-highlight-panel"><div class="panel-head"><div><h2 class="panel-title">关联挖掘</h2><div class="panel-desc">重点看内容质量分、点赞、评论、收藏、分享之间的相关程度，并用简单机器学习模型估计内容侧特征的影响力。</div></div></div><div class="legend-grid" id="relationship-highlights"></div></div>
          <div class="panel span-7" id="relationship-heatmap-panel"><div class="panel-head"><div><h2 class="panel-title">相关性热力图</h2><div class="panel-desc">颜色越深，说明两个指标变化越同步。</div></div></div><div class="chart" id="relationship-heatmap-chart"></div></div>
          <div class="panel span-5" id="relationship-feature-panel"><div class="panel-head"><div><h2 class="panel-title">机器学习特征影响力</h2><div class="panel-desc">使用简单线性模型探索内容侧特征对互动量的解释能力。</div></div></div><div class="chart" id="relationship-feature-chart"></div></div>
          <div class="panel span-6" id="relationship-scatter-panel"><div class="panel-head"><div><h2 class="panel-title">点赞与评论散点</h2><div class="panel-desc">点越大表示收藏越高，颜色越暖代表综合质量分越高。</div></div></div><div class="chart" id="relationship-scatter-chart"></div></div>
          <div class="panel span-6" id="relationship-pair-panel"><div class="panel-head"><div><h2 class="panel-title">最强指标对</h2><div class="panel-desc">把最值得写进论文和报告里的高相关组合直接列出来。</div></div></div><div class="table-wrap" id="relationship-pair-table"></div></div>
        </div>
      </section>
      <section class="page" data-page="clusters">
        <div class="grid">
          <div class="panel span-7" id="cluster-scatter-panel"><div class="panel-head"><div><h2 class="panel-title">内容聚类散点</h2><div class="panel-desc">使用无监督聚类，把样本自动分成不同风格的内容群组。</div></div></div><div class="chart" id="cluster-scatter-chart"></div></div>
          <div class="panel span-5" id="cluster-radar-panel"><div class="panel-head"><div><h2 class="panel-title">聚类画像雷达</h2><div class="panel-desc">对比每一簇在质量、传播、讨论与负面占比上的差异。</div></div></div><div class="chart" id="cluster-radar-chart"></div></div>
          <div class="panel" id="cluster-table-panel"><div class="panel-head"><div><h2 class="panel-title">聚类摘要</h2><div class="panel-desc">每一簇都会给出命名、均值画像和代表样本，便于落地成内容策略。</div></div></div><div class="table-wrap" id="cluster-table"></div></div>
        </div>
      </section>
      <section class="page" data-page="assets">
        <div class="grid">
          <div class="panel" id="asset-summary-panel"><div class="panel-head"><div><h2 class="panel-title">数据资产</h2><div class="panel-desc">这一页只保留后台预处理结果、异常提示和表单格式兼容情况，避免在主分析页抢重点。</div></div><div class="panel-tag" id="asset-generated-at">等待加载</div></div><div class="mini-grid" id="asset-summary-cards"></div></div>
          <div class="panel span-5" id="asset-warning-panel"><div class="panel-head"><div><h2 class="panel-title">预处理提示</h2><div class="panel-desc">有异常才提示，没有异常就保持安静。</div></div></div><div class="warn-list" id="asset-warning-list"></div></div>
          <div class="panel span-7" id="asset-file-panel"><div class="panel-head"><div><h2 class="panel-title">清洗产物</h2><div class="panel-desc">分析系统当前消费的是这三份标准化输出。</div></div></div><div class="table-wrap" id="asset-file-table"></div></div>
          <div class="panel" id="asset-schema-panel"><div class="panel-head"><div><h2 class="panel-title">表单格式兼容</h2><div class="panel-desc">同格式文件先合并再清洗，结构差异集中在这里排查。</div></div></div><div class="table-wrap" id="asset-schema-table"></div></div>
        </div>
      </section>
    `;
  }

  function fmt(value) {
    if (value === null || value === undefined || value === '') return '-';
    const num = Number(value);
    return Number.isFinite(num) ? num.toLocaleString('zh-CN') : String(value);
  }

  function pct(value) {
    return `${Number(value || 0).toFixed(2)}%`;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function fetchJSON(url, options) {
    const response = await fetch(url, options);
    if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
    return response.json();
  }

  function setLoading(flag) {
    $('loading').classList.toggle('hidden', !flag);
  }

  function renderTable(headers, rows, emptyText = '暂无数据') {
    if (!rows.length) return `<div style="padding:20px;color:var(--muted)">${escapeHtml(emptyText)}</div>`;
    return `<table><thead><tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
  }

  function metricBox(label, value, sub) {
    return `<div class="metric-card"><small>${escapeHtml(label)}</small><strong>${escapeHtml(value)}</strong><span>${escapeHtml(sub)}</span></div>`;
  }

  function miniBox(label, value, sub) {
    return `<div class="mini-card"><small>${escapeHtml(label)}</small><strong>${escapeHtml(value)}</strong><span>${escapeHtml(sub)}</span></div>`;
  }

  function chartOption(id, option) {
    if (charts[id]) charts[id].dispose();
    const instance = echarts.init($(id));
    instance.setOption(option);
    charts[id] = instance;
  }

  function disposeCharts() {
    Object.keys(charts).forEach((key) => {
      charts[key]?.dispose?.();
      delete charts[key];
    });
  }

  function initNav() {
    $('main-nav').innerHTML = NAV_ITEMS.map((item) => `
      <button class="nav-btn${item.id === currentPage ? ' active' : ''}" data-page="${item.id}">
        ${item.label}
      </button>
    `).join('');
    $('main-nav').querySelectorAll('[data-page]').forEach((button) => {
      button.addEventListener('click', () => switchPage(button.dataset.page, true));
    });
  }

  function renderIndexBar() {
    const page = NAV_ITEMS.find((item) => item.id === currentPage);
    $('page-index').innerHTML = (page?.anchors || []).map((anchorId) => {
      const title = document.querySelector(`#${anchorId} .panel-title`)?.textContent || '定位';
      return `<button class="index-chip" onclick="document.getElementById('${anchorId}').scrollIntoView({behavior:'smooth',block:'start'})">${escapeHtml(title)}</button>`;
    }).join('');
  }

  function switchPage(pageId, updateHash = false) {
    currentPage = pageId;
    document.querySelectorAll('.page').forEach((page) => {
      page.classList.toggle('active', page.dataset.page === pageId);
    });
    document.querySelectorAll('.nav-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.page === pageId);
    });
    renderIndexBar();
    if (updateHash) history.replaceState(null, '', `#${pageId}`);
    if (!renderedPages.has(pageId)) {
      renderPage(pageId);
      renderedPages.add(pageId);
    }
    setTimeout(() => Object.values(charts).forEach((chart) => chart?.resize?.()), 50);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderPage(pageId) {
    const renderers = {
      overview: renderOverview,
      opinion: renderOpinion,
      content: renderContent,
      relationship: renderRelationship,
      clusters: renderClusters,
      assets: renderAssets
    };
    const renderer = renderers[pageId];
    if (renderer && dashboard) renderer(dashboard);
  }

    $('asset-schema-table').innerHTML = renderTable(
      ['类型', '文件数', '原始行', '标准化后', '额外字段', '文件列表'],
      assets.schema_groups.map((group) => `<tr><td><strong>${escapeHtml(group.kind)}</strong></td><td>${fmt(group.file_count)}</td><td>${fmt(group.raw_row_count)}</td><td>${fmt(group.normalized_row_count)}</td><td>${group.extra_columns.length ? escapeHtml(group.extra_columns.join(' / ')) : '-'}</td><td>${escapeHtml(group.files.join(' | '))}</td></tr>`)
    );
  }

  async function loadDashboard() {
    setLoading(true);
    try {
      dashboard = await fetchJSON('/api/dashboard');
      disposeCharts();
      buildPages();
      renderHero(dashboard);
      renderedPages.clear();
      initNav();
      const hashPage = location.hash.replace('#', '');
      switchPage(NAV_ITEMS.some((item) => item.id === hashPage) ? hashPage : currentPage, false);
    } catch (error) {
      alert(`页面加载失败：${error.message}`);
    } finally {
      setLoading(false);
    }
  }

  async function rebuildDataset() {
    setLoading(true);
    try {
      const result = await fetchJSON('/api/rebuild', { method: 'POST' });
      await loadDashboard();
      alert(result.message || '数据同步完成');
    } catch (error) {
      alert(`数据同步失败：${error.message}`);
    } finally {
      setLoading(false);
    }
  }

  window.addEventListener('hashchange', () => {
    const hashPage = location.hash.replace('#', '');
    if (NAV_ITEMS.some((item) => item.id === hashPage)) switchPage(hashPage, false);
  });

  window.addEventListener('resize', () => {
    Object.values(charts).forEach((chart) => chart?.resize?.());
  });

  loadDashboard();
</script>
</body>
</html>
